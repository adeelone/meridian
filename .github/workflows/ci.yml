name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check packages tests
      - run: mypy packages/core packages/backend packages/cli
      - run: pytest --cov=packages/core/meridian_core --cov=packages/backend/app --cov-report=term-missing --cov-fail-under=80

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/frontend/package-lock.json
      - run: npm install
        working-directory: packages/frontend
      - run: npm run build
        working-directory: packages/frontend
      - run: npm test
        working-directory: packages/frontend
